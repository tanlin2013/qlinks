name: Setup Python and Poetry
description: Set up Python, install system dependencies, install Poetry, and cache the Poetry environment.

inputs:
  python-version:
    description: Python version to install.
    required: true
  poetry-version:
    description: Poetry version to install.
    required: true
  cache-prefix:
    description: Cache key prefix for this workflow/job.
    required: true
  system-packages:
    description: Whitespace-separated apt packages to install before Poetry dependencies.
    required: false
    default: ""
  install-command:
    description: Optional command used to install Python dependencies after cache restoration.
    required: false
    default: ""
  compile-paths:
    description: Optional whitespace-separated paths to compile after Python setup and before dependency installation.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Compile source tree
      if: inputs.compile-paths != ''
      shell: bash
      run: python -m compileall -q ${{ inputs.compile-paths }}

    - name: Install system dependencies
      if: inputs.system-packages != ''
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ${{ inputs.system-packages }}

    - name: Install Poetry
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install "poetry==${{ inputs.poetry-version }}"
        poetry config virtualenvs.in-project true

    - name: Cache Poetry environment
      uses: actions/cache@v5
      with:
        path: |
          .venv
          ~/.cache/pypoetry
          ~/.cache/pip
        key: >-
          ${{ runner.os }}-${{ inputs.cache-prefix }}-py${{ inputs.python-version }}-poetry${{ inputs.poetry-version }}-
          ${{ hashFiles('poetry.lock') }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-${{ inputs.cache-prefix }}-py${{ inputs.python-version }}-poetry${{ inputs.poetry-version }}-

    - name: Install dependencies
      if: inputs.install-command != ''
      shell: bash
      run: ${{ inputs.install-command }}
