name: Test

on: [push, pull_request]

jobs:
  versions:
    runs-on: ubuntu-latest
    outputs:
      default-python: ${{ steps.versions.outputs.default-python }}
      poetry-version: ${{ steps.versions.outputs.poetry-version }}
      python-matrix: ${{ steps.versions.outputs.python-matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Install CI helper dependency
        run: python -m pip install packaging

      - name: Read versions
        id: versions
        run: python scripts/ci_versions.py

  in-os:
    needs: versions
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.versions.outputs.python-matrix) }}
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==${{ needs.versions.outputs.poetry-version }}"
          poetry install -vvv --with dev --all-extras

      - name: Test
        shell: bash
        run: |
          poetry run pytest tests/ -s --trace-config \
            --cov=${{ github.event.repository.name }}/ \
            --cov-report=term-missing ${@-}
          poetry run coverage xml

      - name: Report Coverage
        if: github.ref_name == 'main' && matrix.os == 'ubuntu-latest' && matrix.python-version == needs.versions.outputs.default-python
        uses: codecov/codecov-action@v4
