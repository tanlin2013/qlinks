name: Test

on: [push, pull_request]

jobs:
  versions:
    runs-on: ubuntu-latest
    outputs:
      default-python: ${{ steps.versions.outputs.default-python }}
      poetry-version: ${{ steps.versions.outputs.poetry-version }}
      python-matrix: ${{ steps.versions.outputs.python-matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Install CI helper dependency
        run: python -m pip install packaging

      - name: Read versions
        id: versions
        run: python scripts/ci_versions.py

  in-os:
    needs: versions
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.versions.outputs.python-matrix) }}
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gfortran \
            libblas-dev \
            liblapack-dev \
            pkg-config \
            libxml2-dev \
            libxslt1-dev \
            zlib1g-dev

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==${{ needs.versions.outputs.poetry-version }}"
          poetry config virtualenvs.in-project true

      - name: Cache Poetry environment
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/.cache/pypoetry
            ~/.cache/pip
          key: >-
            ${{ runner.os }}-py${{ matrix.python-version }}-poetry${{ needs.versions.outputs.poetry-version }}-
            ${{ hashFiles('poetry.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-poetry${{ needs.versions.outputs.poetry-version }}-

      - name: Install dependencies
        run: |
          poetry install -vvv --with dev --sync

      - name: Test
        shell: bash
        run: |
          poetry run pytest tests/ -s --trace-config -m "no manual" \
            --cov=${{ github.event.repository.name }}/ \
            --cov-report=term-missing ${@-}
          poetry run coverage xml

      - name: Report Coverage
        if: github.ref_name == 'main' && matrix.os == 'ubuntu-latest' && matrix.python-version == needs.versions.outputs.default-python
        uses: codecov/codecov-action@v4
