name: Lint

on: [push, pull_request]

jobs:
  versions:
    runs-on: ubuntu-latest
    outputs:
      default-python: ${{ steps.versions.outputs.default-python }}
      poetry-version: ${{ steps.versions.outputs.poetry-version }}
    steps:
      - uses: actions/checkout@v7

      - name: Install CI helper dependency
        run: python -m pip install packaging

      - name: Read versions
        id: versions
        run: python scripts/ci_versions.py

  blocking:
    needs: versions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python and Poetry
        uses: ./.github/actions/setup-python-poetry
        with:
          python-version: ${{ needs.versions.outputs.default-python }}
          poetry-version: ${{ needs.versions.outputs.poetry-version }}
          cache-prefix: lint-blocking
          system-packages: build-essential pkg-config libxml2-dev libxslt1-dev zlib1g-dev
          install-command: poetry install -vvv --with dev --sync

      - name: Blocking lint
        run: ./scripts/lint_blocking.sh

  advisory:
    needs: versions
    runs-on: ubuntu-latest
    continue-on-error: true  # mypy/security/cruft reports are advisory for now.

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python and Poetry
        uses: ./.github/actions/setup-python-poetry
        with:
          python-version: ${{ needs.versions.outputs.default-python }}
          poetry-version: ${{ needs.versions.outputs.poetry-version }}
          cache-prefix: lint-advisory
          system-packages: build-essential pkg-config libxml2-dev libxslt1-dev zlib1g-dev
          install-command: poetry install -vvv --with dev --sync

      - name: Advisory lint
        run: ./scripts/lint_advisory.sh
