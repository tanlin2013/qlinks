name: Release

on:
  push:
    branches:
      - 'releases/**'
    tags:
      - 'v*'

jobs:
  versions:
    runs-on: ubuntu-latest
    outputs:
      default-python: ${{ steps.versions.outputs.default-python }}
      poetry-version: ${{ steps.versions.outputs.poetry-version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install CI helper dependency
        run: python -m pip install packaging

      - name: Read versions
        id: versions
        run: python scripts/ci_versions.py

  build:
    needs: versions
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=long
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          build-args: |
            PYTHON_VERSION=${{ needs.versions.outputs.default-python }}
            POETRY_VERSION=${{ needs.versions.outputs.poetry-version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    needs:
      - versions
      - build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    container:
      image: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

    steps:
      - uses: actions/checkout@v6

      - name: Build package
        run: poetry build --format wheel

      - name: Publish a Python distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
