name: Doc

on: [push, pull_request]

jobs:
  versions:
    runs-on: ubuntu-latest
    outputs:
      default-python: ${{ steps.versions.outputs.default-python }}
      poetry-version: ${{ steps.versions.outputs.poetry-version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install CI helper dependency
        run: python -m pip install packaging

      - name: Read versions
        id: versions
        run: python scripts/ci_versions.py

  build:
    needs: versions
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ needs.versions.outputs.default-python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ needs.versions.outputs.default-python }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libxml2-dev \
            libxslt1-dev \
            zlib1g-dev \
            pandoc

      - name: Cache Poetry environment
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/.cache/pypoetry
            ~/.cache/pip
          key: >-
            ${{ runner.os }}-docs-py${{ needs.versions.outputs.default-python }}-poetry${{ needs.versions.outputs.poetry-version }}-
            ${{ hashFiles('poetry.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-docs-py${{ needs.versions.outputs.default-python }}-poetry${{ needs.versions.outputs.poetry-version }}-

      - name: Install dependencies
        run: |
          poetry install -vvv --with docs --sync

      - name: Build Sphinx doc
        run: poetry run make -C docs html

      - name: Deploy
        if: github.event_name == 'push' && github.ref_name == 'main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build/html
