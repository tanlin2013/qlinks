name: Doc

on: [push, pull_request]

jobs:
  versions:
    runs-on: ubuntu-latest
    outputs:
      default-python: ${{ steps.versions.outputs.default-python }}
      poetry-version: ${{ steps.versions.outputs.poetry-version }}
    steps:
      - uses: actions/checkout@v7

      - name: Install CI helper dependency
        run: python -m pip install packaging

      - name: Read versions
        id: versions
        run: python scripts/ci_versions.py

  build:
    needs: versions
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python and Poetry
        uses: ./.github/actions/setup-python-poetry
        with:
          python-version: ${{ needs.versions.outputs.default-python }}
          poetry-version: ${{ needs.versions.outputs.poetry-version }}
          cache-prefix: docs
          system-packages: build-essential pkg-config libxml2-dev libxslt1-dev zlib1g-dev pandoc
          install-command: poetry install -vvv --with docs --sync

      - name: Build Sphinx doc
        run: poetry run make -C docs html

      - name: Deploy
        if: github.event_name == 'push' && github.ref_name == 'main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build/html
